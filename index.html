<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="index.css" />

    <title>AimTraining - Menu</title>
  </head>
  <body>
    <div class="hero">
      <video src="assets/videos/menuVideo.mov" autoplay loop muted></video>
      <div class="content">
        <div class="buttonsContainer" id="buttonsContainer">
          <button class="playBtn button" id="playBtn">Jogar</button>
          <a href="./pages/auth.html" class="button" id="authLink"
            >Autenticar</a
          >
          <div class="button" id="signOutBtn">Sair</div>
        </div>
        <form class="gamemodeForm hide" id="gamemodeForm">
          <label>
            <span class="label">Escolha o modo:</span>
            <select name="modo" id="modo">
              <option value="null">-- Selecione uma opção --</option>
              <option value="flick">Flick</option>
            </select>
          </label>

          <label>
            <span class="label">Dificuldade:</span>
            <select name="dificuldade" id="dificuldade">
              <option value="null">-- Selecione uma opção --</option>
              <option value="facil">Fácil</option>
              <option value="medio">Médio</option>
              <option value="dificil">Difícil</option>
            </select>
          </label>

          <button id="linkToGame">Bora!</button>
        </form>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
