<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aim Training - Auth</title>
  </head>
  <body>
    <form>
      <input
        type="email"
        name="email"
        id="emailRegister"
        placeholder="email"
        autocomplete="off"
        required />
      <input
        type="password"
        name="password"
        id="passwordRegister"
        placeholder="senha"
        autocomplete="off"
        required />
      <button id="registerBtn">register</button>
    </form>

    <form>
      <input
        type="email"
        name="email"
        id="emailLogin"
        placeholder="email"
        autocomplete="off"
        required />
      <input
        type="password"
        name="password"
        id="passwordLogin"
        placeholder="senha"
        autocomplete="off"
        required />
      <button id="loginBtn">login</button>
    </form>

    <button>Sair</button>

    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
