<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="index.css" />

    <title>AimLab Clone - Menu</title>
  </head>
  <body>
    <div class="hero">
      <video src="assets/videos/menuVideo.mov" autoplay loop muted></video>
      <div class="content">
        <button class="playBtn" id="playBtn">Jogar</button>
        <form class="gamemodeForm hide" id="gamemodeForm">
          <label>
            <span class="label">Escolha o modo:</span>
            <select name="modo" id="modo">
              <option value="null">-- Selecione uma opção --</option>
              <option value="flick">Flick</option>
              <option value="tracking">Tracking</option>
            </select>
          </label>

          <label>
            <span class="label">Dificuldade:</span>
            <select name="dificuldade" id="dificuldade">
              <option value="null">-- Selecione uma opção --</option>
              <option value="facil">izi</option>
              <option value="medio">mais ou menos</option>
              <option value="dificil">complicadinho</option>
              <option value="ranked">vem x1 lixo</option>
            </select>
          </label>

          <button id="linkToGame">Bora!</button>
        </form>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
